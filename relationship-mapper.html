<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relationship Mapper — Standard Education</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// ---- Mock roster ----
// 32 students across grades 9-12. Photos live in images/relationship-mapper/,
// referenced with a page-relative path so this resolves correctly both when the
// page is opened directly and when it's embedded in the demos-suite shell via <iframe>.
const PHOTO_DIR = "images/relationship-mapper";
const ROSTER = [
  { id: 1,  name: "Aaliyah Brooks",    grade: 9,  photo: `${PHOTO_DIR}/18-aaliyah-brooks.jpg` },
  { id: 2,  name: "Marcus Reyes",      grade: 9,  photo: `${PHOTO_DIR}/01-marcus-reyes.jpg` },
  { id: 3,  name: "Sofia Nguyen",      grade: 9,  photo: `${PHOTO_DIR}/26-sofia-nguyen.jpg` },
  { id: 4,  name: "Devontae Hill",     grade: 9,  photo: `${PHOTO_DIR}/29-devontae-hill.jpg` },
  { id: 5,  name: "Emma Carter",       grade: 9,  photo: `${PHOTO_DIR}/05-emma-carter.jpg` },
  { id: 6,  name: "Jaylen Washington", grade: 9,  photo: `${PHOTO_DIR}/06-jaylen-washington.jpg` },
  { id: 7,  name: "Priya Patel",       grade: 9,  photo: `${PHOTO_DIR}/21-priya-patel.jpg` },
  { id: 8,  name: "Mason Foster",      grade: 9,  photo: `${PHOTO_DIR}/24-mason-foster.jpg` },
  { id: 9,  name: "Zara Ahmed",        grade: 10, photo: `${PHOTO_DIR}/30-zara-ahmed.jpg` },
  { id: 10, name: "Caleb Murphy",      grade: 10, photo: `${PHOTO_DIR}/07-caleb-murphy.jpg` },
  { id: 11, name: "Isabella Romero",   grade: 10, photo: `${PHOTO_DIR}/14-isabella-romero.jpg` },
  { id: 12, name: "Tyrese Jackson",    grade: 10, photo: `${PHOTO_DIR}/19-tyrese-jackson.jpg` },
  { id: 13, name: "Hannah Lee",        grade: 10, photo: `${PHOTO_DIR}/02-hannah-lee.jpg` },
  { id: 14, name: "Diego Morales",     grade: 10, photo: `${PHOTO_DIR}/27-diego-morales.jpg` },
  { id: 15, name: "Olivia Bennett",    grade: 10, photo: `${PHOTO_DIR}/08-olivia-bennett.jpg` },
  { id: 16, name: "Andre Coleman",     grade: 10, photo: `${PHOTO_DIR}/13-andre-coleman.jpg` },
  { id: 17, name: "Mei Tanaka",        grade: 11, photo: `${PHOTO_DIR}/20-mei-tanaka.jpg` },
  { id: 18, name: "Jordan Pierce",     grade: 11, photo: `${PHOTO_DIR}/22-jordan-pierce.jpg` },
  { id: 19, name: "Lila Sanders",      grade: 11, photo: `${PHOTO_DIR}/03-lila-sanders.jpg` },
  { id: 20, name: "Khalil Roberts",    grade: 11, photo: `${PHOTO_DIR}/31-khalil-roberts.jpg` },
  { id: 21, name: "Ava Thompson",      grade: 11, photo: `${PHOTO_DIR}/09-ava-thompson.jpg` },
  { id: 22, name: "Ethan Garcia",      grade: 11, photo: `${PHOTO_DIR}/17-ethan-garcia.jpg` },
  { id: 23, name: "Naomi Walsh",       grade: 11, photo: `${PHOTO_DIR}/23-naomi-walsh.jpg` },
  { id: 24, name: "Brandon Cho",       grade: 11, photo: `${PHOTO_DIR}/10-brandon-cho.jpg` },
  { id: 25, name: "Ruby Sinclair",     grade: 12, photo: `${PHOTO_DIR}/32-ruby-sinclair.jpg` },
  { id: 26, name: "Trevor Adams",      grade: 12, photo: `${PHOTO_DIR}/11-trevor-adams.jpg` },
  { id: 27, name: "Camila Diaz",       grade: 12, photo: `${PHOTO_DIR}/15-camila-diaz.jpg` },
  { id: 28, name: "Owen Mitchell",     grade: 12, photo: `${PHOTO_DIR}/04-owen-mitchell.jpg` },
  { id: 29, name: "Yara Hassan",       grade: 12, photo: `${PHOTO_DIR}/25-yara-hassan.jpg` },
  { id: 30, name: "Jamal Edwards",     grade: 12, photo: `${PHOTO_DIR}/28-jamal-edwards.jpg` },
  { id: 31, name: "Sienna Park",       grade: 12, photo: `${PHOTO_DIR}/12-sienna-park.jpg` },
  { id: 32, name: "Logan Rivera",      grade: 12, photo: `${PHOTO_DIR}/16-logan-rivera.jpg` },
];

// ---- Pre-populated ratings (so Carrie sees a partially-filled state) ----
const INITIAL_RATINGS = {
  1:  { strength: 3, atRisk: false },
  2:  { strength: 0, atRisk: true  },  // Marcus: no connection, at risk
  5:  { strength: 2, atRisk: false },
  7:  { strength: 1, atRisk: false },
  10: { strength: 3, atRisk: false },
  13: { strength: 0, atRisk: false },  // Hannah: no connection
  17: { strength: 2, atRisk: false },
  22: { strength: 1, atRisk: true  },
  25: { strength: 3, atRisk: false },
  30: { strength: 1, atRisk: false },
};

// Mock aggregate data: pretend 24 other staff have also rated.
// Builds a per-student "total connections in building" count.
const MOCK_AGGREGATE = ROSTER.reduce((acc, s) => {
  // Seeded pseudo-random so the same students always show as isolated.
  const seed = (s.id * 7919 + 13) % 100;
  let connections = Math.floor(seed / 7); // 0-14 ish
  // Force a few students to be isolated for Carrie to find.
  if ([2, 13, 19, 28].includes(s.id)) connections = 0;
  if ([6, 15, 24, 31].includes(s.id))  connections = 1;
  const atRiskFlags = Math.max(0, Math.floor(seed / 30) - 2);
  acc[s.id] = { connections, atRiskFlags };
  return acc;
}, {});

// Three behavioral anchors. Index 0 = unrated. 3 = the PDF's "yellow dot" threshold.
const STRENGTH_LABELS = [
  "Not rated",
  "Recognize",          // I know who they are
  "Connected",          // We interact regularly
  "Trusted",            // They'd come to me with a real problem
];
const STRENGTH_DESCRIPTIONS = [
  "",
  "You know who they are",
  "You interact regularly",
  "They'd come to you with a real problem",
];
const STRENGTH_COLORS = [
  "bg-slate-100 text-slate-500 border-slate-200",
  "bg-sky-100 text-sky-800 border-sky-300",
  "bg-sky-300 text-sky-900 border-sky-500",
  "bg-sky-600 text-white border-sky-700",
];

function StudentAvatar({ student }) {
  const [errored, setErrored] = useState(false);
  const parts = student.name.split(" ");
  const initials = (parts[0][0] + (parts[1]?.[0] || "")).toUpperCase();
  if (errored || !student.photo) {
    return (
      <div className="w-24 h-24 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center font-semibold text-lg flex-shrink-0">
        {initials}
      </div>
    );
  }
  return (
    <img
      src={student.photo}
      alt={student.name}
      onError={() => setErrored(true)}
      className="w-24 h-24 rounded-full object-cover flex-shrink-0 bg-slate-100"
    />
  );
}

function StrengthButtons({ value, onChange }) {
  // Click the active pill again to clear (back to unrated).
  return (
    <div className="flex gap-1.5 flex-wrap">
      {[1, 2, 3].map((n) => {
        const active = value === n;
        const base = active
          ? STRENGTH_COLORS[n] + " ring-2 ring-offset-1 ring-sky-400"
          : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50";
        return (
          <button
            key={n}
            onClick={() => onChange(active ? 0 : n)}
            className={`px-2.5 py-1 text-xs rounded border ${base} transition-all`}
            title={STRENGTH_DESCRIPTIONS[n]}
          >
            {STRENGTH_LABELS[n]}
          </button>
        );
      })}
    </div>
  );
}

function StudentCard({ student, rating, onRate, onToggleAtRisk }) {
  const r = rating || { strength: 0, atRisk: false };
  return (
    <div className="bg-white border border-slate-200 rounded-lg p-4 shadow-sm hover:shadow transition-shadow">
      <div className="flex items-center gap-4">
        <StudentAvatar student={student} />
        <div className="flex-1 min-w-0">
          <div className="font-medium text-slate-900 truncate">{student.name}</div>
          <div className="text-xs text-slate-500">Grade {student.grade}</div>
        </div>
      </div>
      <div className="mt-3 flex items-center justify-between">
        <div>
          <div className="text-[10px] uppercase tracking-wide text-slate-400 mb-1">Level of connection</div>
          <StrengthButtons value={r.strength} onChange={(v) => onRate(student.id, v)} />
        </div>
        <button
          onClick={() => onToggleAtRisk(student.id)}
          className={`text-xs px-2.5 py-1 rounded border transition-colors ${
            r.atRisk
              ? "bg-orange-100 text-orange-800 border-orange-300"
              : "bg-white text-slate-500 border-slate-300 hover:bg-slate-50"
          }`}
          title="Flag as at-risk (PDF: red dot)"
        >
          {r.atRisk ? "⚑ At risk" : "Flag at-risk"}
        </button>
      </div>
    </div>
  );
}

function BuildingView({ ratings }) {
  // Building view counts ONLY top-rung "Trusted" relationships (strength === 3).
  // Lower rungs are captured in the entry data but not surfaced here.
  // Reason: at the aggregate level we want a clean signal that maps to the
  // PDF rubric ("would come to me with a real problem"). Lower-rung data is
  // preserved for a future coaching surface, not the headline dashboard.
  const rows = ROSTER.map((s) => {
    const agg = MOCK_AGGREGATE[s.id];
    const myRating = ratings[s.id];
    const myContributes = (myRating?.strength || 0) === 3 ? 1 : 0;
    const trustedAdults = agg.connections + myContributes;
    const totalAtRisk = agg.atRiskFlags + (myRating?.atRisk ? 1 : 0);
    return { ...s, trustedAdults, totalAtRisk };
  }).sort((a, b) => a.trustedAdults - b.trustedAdults);

  const zeroDot = rows.filter((r) => r.trustedAdults === 0);
  const oneDot  = rows.filter((r) => r.trustedAdults === 1);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="bg-red-50 border border-red-200 rounded-lg p-4">
          <div className="text-3xl font-bold text-red-700">{zeroDot.length}</div>
          <div className="text-sm text-red-900 mt-1">students with <strong>no trusted adult</strong> in the building</div>
          <div className="text-xs text-red-700 mt-2">Tier 1 priority</div>
        </div>
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
          <div className="text-3xl font-bold text-amber-700">{oneDot.length}</div>
          <div className="text-sm text-amber-900 mt-1">students with <strong>only one trusted adult</strong></div>
          <div className="text-xs text-amber-700 mt-2">Tier 2 priority</div>
        </div>
        <div className="bg-orange-50 border border-orange-200 rounded-lg p-4">
          <div className="text-3xl font-bold text-orange-700">
            {rows.filter((r) => r.totalAtRisk > 0).length}
          </div>
          <div className="text-sm text-orange-900 mt-1">students flagged as <strong>at-risk</strong> by at least one staff member</div>
        </div>
      </div>

      <div className="bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-xs text-amber-900">
        <strong>Counting rule:</strong> only "Trusted" ratings count as a connection here. Staff who marked a student as "Recognize" or "Connected" are not counted as a trusted adult for them. Lower-rung data is preserved in the entry view and will power a separate coaching surface later.
      </div>

      <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
        <div className="px-4 py-2 bg-slate-50 border-b border-slate-200 text-xs font-medium uppercase tracking-wide text-slate-500">
          All students, sorted by trusted-adult count
        </div>
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-xs uppercase tracking-wide text-slate-500">
            <tr>
              <th className="text-left px-4 py-2">Student</th>
              <th className="text-left px-4 py-2">Grade</th>
              <th className="text-left px-4 py-2">Trusted adults</th>
              <th className="text-left px-4 py-2">At-risk flags</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r) => {
              const rowClass =
                r.trustedAdults === 0
                  ? "bg-red-50"
                  : r.trustedAdults === 1
                  ? "bg-amber-50"
                  : "";
              return (
                <tr key={r.id} className={`border-t border-slate-100 ${rowClass}`}>
                  <td className="px-4 py-2 font-medium text-slate-900">{r.name}</td>
                  <td className="px-4 py-2 text-slate-600">{r.grade}</td>
                  <td className="px-4 py-2">
                    <span className={`inline-flex items-center gap-2 ${r.trustedAdults === 0 ? "text-red-700 font-semibold" : ""}`}>
                      {r.trustedAdults}
                    </span>
                  </td>
                  <td className="px-4 py-2">
                    {r.totalAtRisk > 0 ? (
                      <span className="text-orange-700">⚑ {r.totalAtRisk}</span>
                    ) : (
                      <span className="text-slate-400">—</span>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="text-xs text-slate-500">
        Numbers are mocked. Imagine 24 other staff in this building have also entered their ratings.
      </div>
    </div>
  );
}

function App() {
  const [ratings, setRatings] = useState(INITIAL_RATINGS);
  const [view, setView] = useState("entries"); // "entries" | "building"
  const [filter, setFilter] = useState("all"); // "all" | "unrated" | "rated" | "atrisk"
  const [gradeFilter, setGradeFilter] = useState("all");

  const rate = (id, strength) => {
    setRatings((prev) => ({
      ...prev,
      [id]: { strength, atRisk: prev[id]?.atRisk || false },
    }));
  };

  const toggleAtRisk = (id) => {
    setRatings((prev) => ({
      ...prev,
      [id]: {
        strength: prev[id]?.strength ?? 0,
        atRisk: !(prev[id]?.atRisk),
      },
    }));
  };

  const visibleStudents = useMemo(() => {
    return ROSTER.filter((s) => {
      if (gradeFilter !== "all" && String(s.grade) !== gradeFilter) return false;
      const r = ratings[s.id];
      const isRated = r && (r.strength > 0 || r.atRisk);
      if (filter === "unrated") return !isRated;
      if (filter === "rated")   return isRated;
      if (filter === "atrisk")  return r?.atRisk;
      return true;
    });
  }, [filter, gradeFilter, ratings]);

  const ratedCount = useMemo(() => {
    return Object.values(ratings).filter((r) => r.strength > 0 || r.atRisk).length;
  }, [ratings]);

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="bg-slate-900 text-white">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div>
            <div className="flex items-center gap-3">
              <h1 className="text-xl font-semibold">Relationship Mapper</h1>
            </div>
            <div className="text-sm text-slate-300 mt-0.5">Westside High School · Staff entry view</div>
          </div>
          <div className="text-right">
            <div className="text-sm font-medium">Ms. R. Thomas</div>
            <div className="text-xs text-slate-400">10th grade English</div>
          </div>
        </div>
      </header>

      {/* Toolbar */}
      <div className="bg-white border-b border-slate-200">
        <div className="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-2">
            <button
              onClick={() => setView("entries")}
              className={`px-3 py-1.5 rounded text-sm font-medium transition-colors ${
                view === "entries" ? "bg-slate-900 text-white" : "text-slate-600 hover:bg-slate-100"
              }`}
            >
              Your entries
            </button>
            <button
              onClick={() => setView("building")}
              className={`px-3 py-1.5 rounded text-sm font-medium transition-colors ${
                view === "building" ? "bg-slate-900 text-white" : "text-slate-600 hover:bg-slate-100"
              }`}
            >
              Building view <span className="text-xs opacity-70">(aggregate)</span>
            </button>
          </div>
          <div className="text-sm text-slate-600">
            You've rated <strong className="text-slate-900">{ratedCount}</strong> of {ROSTER.length} students
            <span className="ml-3 text-xs text-slate-400">Mapping window closes Oct 18</span>
          </div>
        </div>

        {view === "entries" && (
          <div className="max-w-7xl mx-auto px-6 pb-3 flex items-center gap-3 flex-wrap">
            <div className="text-xs uppercase tracking-wide text-slate-500 mr-1">Filter:</div>
            {[
              ["all", "All"],
              ["unrated", "Unrated"],
              ["rated", "Rated"],
              ["atrisk", "At-risk"],
            ].map(([k, label]) => (
              <button
                key={k}
                onClick={() => setFilter(k)}
                className={`text-xs px-2.5 py-1 rounded border transition-colors ${
                  filter === k
                    ? "bg-sky-50 text-sky-800 border-sky-300"
                    : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"
                }`}
              >
                {label}
              </button>
            ))}
            <div className="text-xs text-slate-400 ml-2">|</div>
            <div className="text-xs uppercase tracking-wide text-slate-500">Grade:</div>
            {["all", "9", "10", "11", "12"].map((g) => (
              <button
                key={g}
                onClick={() => setGradeFilter(g)}
                className={`text-xs px-2.5 py-1 rounded border transition-colors ${
                  gradeFilter === g
                    ? "bg-sky-50 text-sky-800 border-sky-300"
                    : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"
                }`}
              >
                {g === "all" ? "All" : g}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Main */}
      <main className="max-w-7xl mx-auto px-6 py-6">
        {view === "entries" ? (
          <>
            <div className="bg-sky-50 border border-sky-200 rounded-lg p-4 mb-5 text-sm text-sky-900">
              <div className="font-semibold text-sky-900 mb-1">What you're doing here</div>
              <p className="text-sky-900">For each student in the building, pick the level of connection that best describes where you are with them. The goal is to help the building team see which students do not yet have a trusted adult, so we can intentionally build those connections. Leave a student blank if you don't recognize them. That's a useful signal on its own.</p>
              <div className="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-2 text-xs">
                <div className="bg-white border border-sky-200 rounded px-3 py-2">
                  <div className="font-semibold text-sky-800">Recognize</div>
                  <div className="text-slate-600">You know who they are</div>
                </div>
                <div className="bg-white border border-sky-200 rounded px-3 py-2">
                  <div className="font-semibold text-sky-800">Connected</div>
                  <div className="text-slate-600">You interact regularly</div>
                </div>
                <div className="bg-white border border-sky-200 rounded px-3 py-2">
                  <div className="font-semibold text-sky-800">Trusted</div>
                  <div className="text-slate-600">They'd come to you with a real problem</div>
                </div>
              </div>
              <p className="mt-3">Separately, flag any student you're concerned about academically, socially, or personally. Your entries save as you go.</p>
            </div>
            {visibleStudents.length === 0 ? (
              <div className="text-center py-12 text-slate-500">No students match this filter.</div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {visibleStudents.map((s) => (
                  <StudentCard
                    key={s.id}
                    student={s}
                    rating={ratings[s.id]}
                    onRate={rate}
                    onToggleAtRisk={toggleAtRisk}
                  />
                ))}
              </div>
            )}
          </>
        ) : (
          <BuildingView ratings={ratings} />
        )}
      </main>

      {/* Footer */}
      <footer className="border-t border-slate-200 mt-12">
        <div className="max-w-7xl mx-auto px-6 py-4 text-xs text-slate-500 flex justify-between flex-wrap gap-2">
          <div>
            Demo scope: one staff member's view + aggregate building view. No assignment workflow.
            No student-perspective entry. No real backend.
          </div>
          <div className="text-slate-400">Standard Education</div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
